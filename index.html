<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Opacity | Outdoor Lighting Design</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      background: #0a0a0a;
      color: #e8dcc8;
      font-family: 'Montserrat', sans-serif;
      overflow: hidden;
    }

    /* Ambient glow orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(140px);
      opacity: 0.28;
      pointer-events: none;
      z-index: 0;
    }
    .orb-1 {
      width: 900px; height: 900px;
      background: radial-gradient(circle, #c8922a 0%, #7a4e10 40%, transparent 70%);
      top: -300px; left: -300px;
      animation: drift1 18s ease-in-out infinite alternate;
    }
    .orb-2 {
      width: 800px; height: 800px;
      background: radial-gradient(circle, #b07820 0%, #5a3a08 45%, transparent 70%);
      bottom: -250px; right: -250px;
      animation: drift2 22s ease-in-out infinite alternate;
    }
    .orb-3 {
      width: 600px; height: 600px;
      background: radial-gradient(circle, #e8b84b 0%, #c8922a 30%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      animation: pulse 8s ease-in-out infinite;
    }
    .orb-4 {
      width: 500px; height: 200px;
      background: radial-gradient(ellipse, #c8922a55 0%, transparent 70%);
      bottom: 0; left: 50%;
      transform: translateX(-50%);
      filter: blur(80px);
      opacity: 0.35;
      animation: drift1 25s ease-in-out infinite alternate;
    }

    @keyframes drift1 { from { transform: translate(0,0); } to { transform: translate(60px, 80px); } }
    @keyframes drift2 { from { transform: translate(0,0); } to { transform: translate(-60px, -60px); } }
    @keyframes pulse { 0%,100% { opacity: 0.08; } 50% { opacity: 0.22; } }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      opacity: 0.35;
      pointer-events: none;
      z-index: 1;
    }

    /* Main layout */
    .container {
      position: relative;
      z-index: 2;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }

    /* Thin top rule */
    .rule {
      width: 1px;
      height: 80px;
      background: linear-gradient(to bottom, transparent, #c8922a88, transparent);
      margin-bottom: 2.5rem;
      animation: fadeIn 2s ease 0.5s both;
    }

    /* Logo */
    .logo-wrap {
      margin-bottom: 2.8rem;
      animation: fadeIn 2s ease 0.8s both;
    }
    .logo-wrap img {
      width: 420px;
      max-width: 80vw;
      filter: brightness(1.05) drop-shadow(0 0 30px rgba(200,146,42,0.25));
    }

    /* Divider line */
    .divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 2.2rem;
      animation: fadeIn 2s ease 1.1s both;
    }
    .divider-line {
      width: 60px;
      height: 1px;
      background: linear-gradient(to right, transparent, #c8922a);
    }
    .divider-line.right {
      background: linear-gradient(to left, transparent, #c8922a);
    }
    .divider-diamond {
      width: 5px; height: 5px;
      background: #c8922a;
      transform: rotate(45deg);
    }

    /* Tagline */
    .tagline {
      font-family: 'Montserrat', sans-serif;
      font-weight: 200;
      font-size: clamp(0.6rem, 1.4vw, 0.75rem);
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: #c8922a;
      margin-bottom: 1.2rem;
      animation: fadeIn 2s ease 1.3s both;
    }

    /* Coming Soon */
    .coming-soon {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(2.6rem, 6vw, 5rem);
      letter-spacing: 0.12em;
      color: #f0e6d0;
      line-height: 1;
      margin-bottom: 1.6rem;
      animation: fadeIn 2s ease 1.5s both;
    }

    /* Sub text */
    .sub {
      font-family: 'Montserrat', sans-serif;
      font-weight: 200;
      font-size: clamp(0.65rem, 1.2vw, 0.78rem);
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #8a7a65;
      animation: fadeIn 2s ease 1.8s both;
    }

    .rule.bottom {
      margin-top: 2.5rem;
      margin-bottom: 0;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Subtle corner accents */
    .corner {
      position: fixed;
      width: 40px; height: 40px;
      z-index: 2;
      opacity: 0.4;
    }
    .corner.tl { top: 24px; left: 24px; border-top: 1px solid #c8922a; border-left: 1px solid #c8922a; }
    .corner.tr { top: 24px; right: 24px; border-top: 1px solid #c8922a; border-right: 1px solid #c8922a; }
    .corner.bl { bottom: 24px; left: 24px; border-bottom: 1px solid #c8922a; border-left: 1px solid #c8922a; }
    .corner.br { bottom: 24px; right: 24px; border-bottom: 1px solid #c8922a; border-right: 1px solid #c8922a; }
  </style>
</head>
